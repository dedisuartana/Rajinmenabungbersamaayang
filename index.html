<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Tabungan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="number"], input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #218838; }
        .hidden { display: none; }
        .loading { text-align: center; font-style: italic; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h2>Login User</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit">Masuk</button>
        </form>
    </div>

    <div class="container hidden" id="nabung-section">
        <h2>Form Tabungan</h2>
        <form id="nabung-form">
            <div class="form-group">
                <label for="tanggal">Tanggal (Otomatis)</label>
                <input type="date" id="tanggal" name="tanggal" readonly required>
            </div>
            <div class="form-group">
                <label for="nama">Nama Penabung (Otomatis)</label>
                <input type="text" id="nama" name="nama" readonly required>
            </div>
            <div class="form-group">
                <label for="jumlah">Jumlah Tabungan (Rp)</label>
                <input type="number" id="jumlah" name="jumlah" placeholder="Contoh: 50000" required>
            </div>
            <button type="submit" id="btn-submit">Simpan Tabungan</button>
            <div id="status-pesan" class="loading hidden">Menyimpan data...</div>
        </form>
    </div>
    <script>

   const scriptURL = 'https://script.google.com/macros/s/AKfycbxLigCBg2-W5a9grqqNAs44Li94HYVXfCMrZeF7SNAErnKyo_8-O_UtGhPLlbvcFUb_VQ/exec';

// 1. Logika Login dari Spreadsheet
loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    // Menyiapkan data untuk dikirim ke Apps Script
    const loginData = new FormData();
    loginData.append('action', 'login');
    loginData.append('username', user);
    loginData.append('password', pass);

    fetch(scriptURL, { method: 'POST', body: loginData })
        .then(response => response.text())
        .then(result => {
            if (result === "Login_Success") {
                loginSection.classList.add('hidden');
                nabungSection.classList.remove('hidden');
                inputNama.value = user;
                inputTanggal.value = new Date().toISOString().split('T')[0];
            } else {
                alert("Username atau Password salah!");
            }
        });
});

// 2. Logika Simpan Tabungan
nabungForm.addEventListener('submit', function(e) {
    e.preventDefault();
    btnSubmit.classList.add('hidden');
    statusPesan.classList.remove('hidden');

    const formData = new FormData(nabungForm);
    formData.append('action', 'saveData'); // Tambahkan parameter action

    fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => {
            alert('Tabungan berhasil dicatat ke Hasna Medika Mobile!');
            document.getElementById('jumlah').value = '';
            btnSubmit.classList.remove('hidden');
            statusPesan.classList.add('hidden');
        })
        .catch(error => {
            alert('Gagal menyimpan data.');
            btnSubmit.classList.remove('hidden');
            statusPesan.classList.add('hidden');
        });
});
</script>
</body>
</html>
