<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Tabungan - Hasna Medika</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000; /* Warna dasar gelap untuk Aurora */
            padding: 20px;
            box-sizing: border-box;
        }

        /* CONTAINER UNTUK BACKGROUND AURORA WEBGL */
        .aurora-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Berada paling belakang */
            pointer-events: none; /* Agar tidak mengganggu klik pada tabel */
        }

        /* CONTAINER TABEL GLASSMORPHISM */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 600px;
            position: relative; 
            z-index: 10; /* Berada di depan background */
        }

        h2 { text-align: center; color: #333; margin-top: 0; }
        
        /* STYLE UNTUK TABEL */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* Agar tabel bisa di-scroll di HP */
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #3e045a;
            color: white;
        }
        tr:hover { background-color: #f1f1f1; }
        
        .total-row {
            font-weight: bold;
            background-color: #e2e3e5;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #3e045a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #450662; }
        .btn-kembali { background-color: #6c757d; }
        .btn-kembali:hover { background-color: #5a6268; }

        #loading { text-align: center; font-style: italic; color: #333; font-weight: bold; margin: 20px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="aurora-bg" class="aurora-container"></div>

    <div class="container">
        <h2>Tabungan Kita 😍</h2>
        
        <div id="loading">Sedang mengambil data dari server... ⏳</div>

        <div class="table-responsive">
            <table id="tabel-data" class="hidden">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Penabung</th>
                        <th>Jumlah (Rp)</th>
                    </tr>
                </thead>
                <tbody id="body-tabel">
                    </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2" style="text-align: right;">Total Keseluruhan:</td>
                        <td id="total-uang">Rp 0</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="btn-container">
            <button class="btn-kembali" onclick="window.location.href='index.html'">⬅ Kembali</button>
            <button onclick="fetchData()">🔄 Refresh Data</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxLigCBg2-W5a9grqqNAs44Li94HYVXfCMrZeF7SNAErnKyo_8-O_UtGhPLlbvcFUb_VQ/exec';
        const getURL = scriptURL + '?action=getData';

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        function fetchData() {
            const tabel = document.getElementById('tabel-data');
            const loading = document.getElementById('loading');
            const tbody = document.getElementById('body-tabel');
            const totalUang = document.getElementById('total-uang');

            tabel.classList.add('hidden');
            loading.classList.remove('hidden');
            tbody.innerHTML = '';
            
            fetch(getURL)
                .then(response => response.json())
                .then(data => {
                    let total = 0;

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Belum ada data tabungan.</td></tr>';
                    } else {
                        data.forEach(row => {
                            const tr = document.createElement('tr');
                            let jumlahBersih = row.jumlah.toString().replace(/[^0-9,-]+/g,"");
                            let angkaJumlah = parseInt(jumlahBersih) || 0;
                            total += angkaJumlah;

                            tr.innerHTML = `
                                <td>${row.tanggal}</td>
                                <td>${row.nama}</td>
                                <td>${formatRupiah(angkaJumlah)}</td>
                            `;
                            tbody.appendChild(tr);
                        });
                    }

                    totalUang.innerText = formatRupiah(total);
                    loading.classList.add('hidden');
                    tabel.classList.remove('hidden');
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    loading.innerText = '❌ Gagal mengambil data. Pastikan fungsi doGet sudah di-deploy di Apps Script.';
                });
        }

        window.onload = fetchData;
    </script>

    <script type="module">
        import { Renderer, Program, Mesh, Color, Triangle } from 'https://unpkg.com/ogl';

        const VERT = `#version 300 es
        in vec2 position;
        void main() {
            gl_Position = vec4(position, 0.0, 1.0);
        }`;

        const FRAG = `#version 300 es
        precision highp float;
        uniform float uTime;
        uniform float uAmplitude;
        uniform vec3 uColorStops[3];
        uniform vec2 uResolution;
        uniform float uBlend;
        out vec4 fragColor;

        vec3 permute(vec3 x) { return mod(((x * 34.0) + 1.0) * x, 289.0); }

        float snoise(vec2 v){
            const vec4 C = vec4(
                0.211324865405187, 0.366025403784439,
                -0.577350269189626, 0.024390243902439
            );
            vec2 i  = floor(v + dot(v, C.yy));
            vec2 x0 = v - i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod(i, 289.0);
            vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
            vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
            m = m * m; m = m * m;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;
            m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }

        struct ColorStop { vec3 color; float position; };

        #define COLOR_RAMP(colors, factor, finalColor) { \
            int index = 0; \
            for (int i = 0; i < 2; i++) { \
                ColorStop currentColor = colors[i]; \
                bool isInBetween = currentColor.position <= factor; \
                index = int(mix(float(index), float(i), float(isInBetween))); \
            } \
            ColorStop currentColor = colors[index]; \
            ColorStop nextColor = colors[index + 1]; \
            float range = nextColor.position - currentColor.position; \
            float lerpFactor = (factor - currentColor.position) / range; \
            finalColor = mix(currentColor.color, nextColor.color, lerpFactor); \
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / uResolution;
            ColorStop colors[3];
            colors[0] = ColorStop(uColorStops[0], 0.0);
            colors[1] = ColorStop(uColorStops[1], 0.5);
            colors[2] = ColorStop(uColorStops[2], 1.0);
            
            vec3 rampColor;
            COLOR_RAMP(colors, uv.x, rampColor);
            
            float height = snoise(vec2(uv.x * 2.0 + uTime * 0.1, uTime * 0.25)) * 0.5 * uAmplitude;
            height = exp(height);
            height = (uv.y * 2.0 - height + 0.2);
            float intensity = 0.6 * height;
            
            float midPoint = 0.20;
            float auroraAlpha = smoothstep(midPoint - uBlend * 0.5, midPoint + uBlend * 0.5, intensity);
            
            vec3 auroraColor = intensity * rampColor;
            fragColor = vec4(auroraColor * auroraAlpha, auroraAlpha);
        }
        `;

        const ctn = document.getElementById('aurora-bg');
        const renderer = new Renderer({ alpha: true, premultipliedAlpha: true, antialias: true });
        const gl = renderer.gl;
        gl.clearColor(0, 0, 0, 0);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
        gl.canvas.style.backgroundColor = 'transparent';
        ctn.appendChild(gl.canvas);

        const geometry = new Triangle(gl);
        
        const colorStops = ['#5227FF', '#7cff67', '#5227FF'];
        const colorStopsArray = colorStops.map(hex => {
            const c = new Color(hex);
            return [c[0], c[1], c[2]]; 
        });

        const program = new Program(gl, {
            vertex: VERT,
            fragment: FRAG,
            uniforms: {
                uTime: { value: 0 },
                uAmplitude: { value: 1.0 },
                uColorStops: { value: colorStopsArray },
                uResolution: { value: [ctn.offsetWidth, ctn.offsetHeight] },
                uBlend: { value: 0.5 }
            }
        });

        const mesh = new Mesh(gl, { geometry, program });

        function resize() {
            renderer.setSize(ctn.offsetWidth, ctn.offsetHeight);
            program.uniforms.uResolution.value = [ctn.offsetWidth, ctn.offsetHeight];
        }
        window.addEventListener('resize', resize);
        resize();

        function update(t) {
            requestAnimationFrame(update);
            program.uniforms.uTime.value = t * 0.001; 
            renderer.render({ scene: mesh });
        }
        requestAnimationFrame(update);
    </script>
</body>
</html>
